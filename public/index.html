<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MongoDB CRUD - Student Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      color: #00d4aa;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 30px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* CRUD Form Card */
    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 16px;
      color: #00d4aa;
      margin-bottom: 16px;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 5px;
      color: #eee;
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #00d4aa;
    }

    input::placeholder { color: #555; }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-create  { background: #00d4aa; color: #000; }
    .btn-read    { background: #4a90d9; color: #fff; }
    .btn-update  { background: #f5a623; color: #000; }
    .btn-delete  { background: #e74c3c; color: #fff; }
    .btn-clear   { background: #555; color: #fff; }

    /* Message Box */
    .message {
      padding: 10px 14px;
      border-radius: 5px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .message.success { background: #0d3d2e; border: 1px solid #00d4aa; color: #00d4aa; }
    .message.error   { background: #3d0d0d; border: 1px solid #e74c3c; color: #e74c3c; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: #0f3460;
      color: #00d4aa;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #1a3a60;
    }

    tbody tr:hover { background: #0f3460; cursor: pointer; }

    td.actions { display: flex; gap: 6px; }

    .act-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-weight: bold;
    }

    .act-edit   { background: #f5a623; color: #000; }
    .act-delete { background: #e74c3c; color: #fff; }

    .badge {
      background: #00d4aa;
      color: #000;
      border-radius: 12px;
      padding: 2px 9px;
      font-size: 11px;
      font-weight: bold;
    }

    .empty-msg {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 14px;
    }

    /* Step Labels */
    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .step-pill {
      background: #0f3460;
      color: #00d4aa;
      border: 1px solid #00d4aa44;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🍃 MongoDB Student Manager</h1>
  <p class="subtitle">CRUD Operations Demo — Schema: Students Collection</p>

  <div class="steps">
    <span class="step-pill">✅ CREATE</span>
    <span class="step-pill">📖 READ</span>
    <span class="step-pill">✏️ UPDATE</span>
    <span class="step-pill">🗑 DELETE</span>
  </div>

  <!-- Form Card -->
  <div class="card">
    <h2>📋 Student Form</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="name" placeholder="e.g. Rahul Sharma"/>
      </div>
      <div class="form-group">
        <label>Roll No *</label>
        <input type="number" id="rollNo" placeholder="e.g. 101"/>
      </div>
      <div class="form-group">
        <label>Branch *</label>
        <select id="branch">
          <option value="">Select Branch</option>
          <option>Computer Science</option>
          <option>Information Technology</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
        </select>
      </div>
      <div class="form-group">
        <label>Marks (0–100)</label>
        <input type="number" id="marks" placeholder="e.g. 85" min="0" max="100"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="e.g. rahul@college.edu"/>
      </div>
      <div class="form-group" style="justify-content: flex-end;">
        <label>&nbsp;</label>
        <input type="hidden" id="editId"/>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-create" onclick="createStudent()">➕ Create</button>
      <button class="btn btn-read"   onclick="readStudents()">📖 Read All</button>
      <button class="btn btn-update" onclick="updateStudent()">✏️ Update</button>
      <button class="btn btn-delete" onclick="deleteStudent()">🗑 Delete</button>
      <button class="btn btn-clear"  onclick="clearForm()">✖ Clear</button>
    </div>

    <div class="message" id="msgBox"></div>
  </div>

  <!-- Table Card -->
  <div class="card">
    <h2>📊 Students Collection <span class="badge" id="countBadge">0</span></h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Roll No</th>
            <th>Branch</th>
            <th>Marks</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentTable">
          <tr><td colspan="7" class="empty-msg">Click "Read All" to load students</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const BASE = '';

  function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'message ' + type;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }

  function getFormData() {
    return {
      name:   document.getElementById('name').value.trim(),
      rollNo: parseInt(document.getElementById('rollNo').value),
      branch: document.getElementById('branch').value,
      marks:  parseInt(document.getElementById('marks').value) || 0,
      email:  document.getElementById('email').value.trim()
    };
  }

  function clearForm() {
    ['name','rollNo','marks','email'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('branch').value = '';
    document.getElementById('editId').value = '';
  }

  async function createStudent() {
    const data = getFormData();
    if (!data.name || !data.rollNo || !data.branch) {
      return showMsg('⚠ Name, Roll No and Branch are required.', 'error');
    }
    try {
      const res = await fetch('/students', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
      });
      const json = await res.json();
      if (json.success) { showMsg('✅ ' + json.message, 'success'); clearForm(); readStudents(); }
      else showMsg('❌ ' + json.message, 'error');
    } catch { showMsg('❌ Server not connected. Start server.js first.', 'error'); }
  }

  async function readStudents() {
    try {
      const res = await fetch('/students');
      const json = await res.json();
      const tbody = document.getElementById('studentTable');
      document.getElementById('countBadge').textContent = json.count || 0;
      if (!json.data || json.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No students found</td></tr>';
        return;
      }
      tbody.innerHTML = json.data.map((s, i) => `
        <tr>
          <td>${i+1}</td>
          <td>${s.name}</td>
          <td>${s.rollNo}</td>
          <td>${s.branch}</td>
          <td>${s.marks ?? '-'}</td>
          <td>${s.email || '-'}</td>
          <td class="actions">
            <button class="act-btn act-edit" onclick="fillForm('${s._id}','${s.name}','${s.rollNo}','${s.branch}','${s.marks}','${s.email}')">Edit</button>
            <button class="act-btn act-delete" onclick="deleteById('${s._id}')">Del</button>
          </td>
        </tr>`).join('');
    } catch { showMsg('❌ Server not connected. Start server.js first.', 'error'); }
  }

  function fillForm(id, name, rollNo, branch, marks, email) {
    document.getElementById('editId').value = id;
    document.getElementById('name').value = name;
    document.getElementById('rollNo').value = rollNo;
    document.getElementById('branch').value = branch;
    document.getElementById('marks').value = marks;
    document.getElementById('email').value = email === 'undefined' ? '' : email;
    showMsg('📝 Form loaded for editing. Click Update.', 'success');
    window.scrollTo(0, 0);
  }

  async function updateStudent() {
    const id = document.getElementById('editId').value;
    if (!id) return showMsg('⚠ Select a student row to edit first.', 'error');
    const data = getFormData();
    try {
      const res = await fetch(`/students/${id}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
      });
      const json = await res.json();
      if (json.success) { showMsg('✅ ' + json.message, 'success'); clearForm(); readStudents(); }
      else showMsg('❌ ' + json.message, 'error');
    } catch { showMsg('❌ Server not connected.', 'error'); }
  }

  async function deleteStudent() {
    const id = document.getElementById('editId').value;
    if (!id) return showMsg('⚠ Select a student row to delete first.', 'error');
    await deleteById(id);
  }

  async function deleteById(id) {
    if (!confirm('Delete this student?')) return;
    try {
      const res = await fetch(`/students/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if (json.success) { showMsg('🗑 ' + json.message, 'success'); clearForm(); readStudents(); }
      else showMsg('❌ ' + json.message, 'error');
    } catch { showMsg('❌ Server not connected.', 'error'); }
  }
</script>

</body>
</html>
